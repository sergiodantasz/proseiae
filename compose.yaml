services:
  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: proseiae
      POSTGRES_PASSWORD: proseiae
      POSTGRES_DB: proseiae
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U proseiae -d proseiae"]
      interval: 5s
      timeout: 5s
      retries: 5
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
volumes:
  postgres_data:
  redis_data:
